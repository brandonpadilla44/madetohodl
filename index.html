<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadeToHodl</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            text-align: center;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 80px auto;
            padding: 40px 20px;
        }
        .logo {
            max-width: 420px;
            width: 90%;
            height: auto;
            margin: 0 auto 40px;
            display: block;
        }
        .coming-soon {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: #00ff9d;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 3.2rem;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .tagline {
            font-size: 1.35rem;
            color: #aaaaaa;
            margin-bottom: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .shop-button {
            display: inline-block;
            background-color: #00ff9d;
            color: #000000;
            padding: 14px 32px;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 60px;
        }
        .shop-button:hover {
            background-color: #ffffff;
            transform: scale(1.05);
        }
        .market-buttons {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .market-button {
            width: 52px;
            height: 52px;
            background-color: #00ff9d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0, 255, 157, 0.3);
            overflow: hidden;
        }
        .market-button:hover {
            transform: scale(1.12);
            box-shadow: 0 6px 18px rgba(0, 255, 157, 0.4);
        }
        .market-button img {
            width: 28px;
            height: 28px;
        }
        footer {
            margin-top: 100px;
            color: #555;
            font-size: 0.95rem;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.6rem; }
            .tagline { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Asset 1M2H Logo V1.png" alt="MadeToHodl Logo" class="logo">

        <div class="coming-soon">COMING SOON</div>
        <h1>MADE TO HODL</h1>
        <p class="tagline">XRP locked with every purchase<br>
        Built by the Community • For the Community</p>
        
        <a href="https://madetohodl.shop" class="shop-button">
            SHOP COMING SOON
        </a>

        <!-- Small Green Circular Icon Buttons -->
        <div class="market-buttons">
            <a href="https://madetohodl.shop" class="market-button">
                <img src="coingecko-icon.webp" alt="CoinGecko">
            </a>
            <a href="https://madetohodl.shop" class="market-button">
                <img src="coinmarketcap-icon.webp" alt="CoinMarketCap">
            </a>
            <a href="https://madetohodl.shop" class="market-button">
                <img src="x-icon.webp" alt="X">
            </a>
        </div>

        <footer>
            © 2026 Made to HODL<br>
            {A Merch Treasury Project}<br>
            San Diego, CA
        </footer>
    </div>
</body>
</html>
